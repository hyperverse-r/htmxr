url: https://hyperverse-r.github.io/htmxr/

development:
  mode: auto

template:
  bootstrap: 5
  theme: dracula
  bslib:
    bootswatch: simplex
    base_font: { google: "Lato" }
    heading_font: { google: "Vampiro One" }
    code_font: { google: "JetBrains Mono" }
    pkgdown-nav-height: 80px
    primary: "#232323"
    body: "#232323"
    info: "#f15521"
    bg: "#232323"
    fg: "#e8e8e8"
    headings-color: "#e8e8e8"
    link-color: "#a3c4f3"
    link-hover-color: "#c5d9f8"
    code-color: "#f8f8f2"
    code-bg: "#282a36"

navbar:
  bg: primary
  type: dark
  structure:
    left: [reference, news]
    right: [search]

reference:
  - title: Page
    desc: Build a complete HTML page with htmx support.
    contents:
      - hx_page
      - hx_head
      - hx_serve_assets

  - title: Inputs
    desc: Interactive input components wired to htmx requests.
    contents:
      - hx_button
      - hx_select_input
      - hx_slider_input

  - title: Table
    desc: Generate and update HTML tables via htmx swaps.
    contents:
      - hx_table
      - hx_table_rows

  - title: htmx modifiers
    desc: Add or modify htmx attributes on any HTML element.
    contents:
      - hx_set

  - title: Server
    desc: Server-side utilities for handling htmx requests.
    contents:
      - htmxr_is_htmx

  - title: Developer tools
    desc: Helpers for running and exploring built-in examples.
    contents:
      - hx_run_example

footer:
  structure:
    left: thinkr
    right: [hyperverse-r]
  components:
    thinkr: <a href="https://thinkr.fr/" target="_blank">© ThinkR - A French company of R experts</a>
    hyperverse-r: <a href="https://github.com/hyperverse-r" target="_blank">Explore the hyperverse</a>
